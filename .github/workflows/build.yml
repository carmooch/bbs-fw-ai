name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [BBSHD, BBS02, TSDZ2]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDCC
        run: |
          sudo apt-get update
          sudo apt-get install -y sdcc

      - name: Build ${{ matrix.target }}
        working-directory: src/firmware
        run: make all TARGET_CONTROLLER=${{ matrix.target }}

      - name: Upload hex
        uses: actions/upload-artifact@v4
        with:
          name: bbs-fw-${{ matrix.target }}
          path: src/firmware/*.hex
          if-no-files-found: error

  host-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run tests
        working-directory: src/firmware/test
        run: make run

  web-tool:
    name: Web config tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web-tool/package-lock.json

      - name: Install dependencies
        working-directory: src/web-tool
        run: npm ci

      - name: Run tests
        working-directory: src/web-tool
        run: npm test

      - name: Build
        working-directory: src/web-tool
        run: npm run build
