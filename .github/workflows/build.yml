name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [BBSHD, BBS02, TSDZ2]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDCC
        run: |
          sudo apt-get update
          sudo apt-get install -y sdcc

      - name: Debug UNAME detection
        working-directory: src/firmware
        run: |
          echo "PATH=$PATH"
          echo "ENV_UNAME=[$UNAME]"
          make -p -q -f Makefile TARGET_CONTROLLER=BBSHD 2>&1 | grep -A3 -B1 '^UNAME' || true

      - name: Build ${{ matrix.target }}
        working-directory: src/firmware
        run: make all TARGET_CONTROLLER=${{ matrix.target }}

      - name: Upload hex
        uses: actions/upload-artifact@v4
        with:
          name: bbs-fw-${{ matrix.target }}
          path: src/firmware/*.hex
          if-no-files-found: error
