name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [BBSHD, BBS02, TSDZ2]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDCC
        run: |
          sudo apt-get update
          sudo apt-get install -y sdcc

      - name: Debug UNAME detection
        working-directory: src/firmware
        run: |
          echo "PATH=$PATH"
          printf '$(info DEBUG: TARGET=[$(TARGET)] CC=[$(CC)] UNAME=[$(UNAME)] FINDSTRING=[$(findstring ;,$(PATH))] SHELLUNAME=[$(shell uname)])\ndebugtarget:\n\t@true\n' > debug.mk
          make -f Makefile -f debug.mk debugtarget TARGET_CONTROLLER=BBSHD 2>&1 || true
          rm -f debug.mk

      - name: Build ${{ matrix.target }}
        working-directory: src/firmware
        run: make all TARGET_CONTROLLER=${{ matrix.target }}

      - name: Upload hex
        uses: actions/upload-artifact@v4
        with:
          name: bbs-fw-${{ matrix.target }}
          path: src/firmware/*.hex
          if-no-files-found: error
